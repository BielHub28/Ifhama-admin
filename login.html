<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IFHAMA Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f5132 0%, #198754 50%, #20c997 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 420px; width: 100%; padding: 2.5rem; transform: translateY(0); transition: all 0.3s ease; }
        .login-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .logo-img { width: 100px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #ced4da; background-color: #f8f9fa; }
        .form-control:focus { box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); border-color: #198754; background-color: #ffffff; }
        .btn-login { border-radius: 10px; padding: 12px; font-weight: bold; letter-spacing: 1px; background: linear-gradient(to right, #198754, #20c997); border: none; transition: all 0.3s ease; }
        .btn-login:hover { background: linear-gradient(to right, #146c43, #198754); transform: scale(1.02); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <img src="assets/Logo Mahad Aly.png" alt="Logo Mahad Aly" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3303/3303319.png'"> 
        <h3 class="fw-bold text-success mb-1">IFHAMA</h3>
        <p class="text-muted small">Sistem Administrasi Setoran Hafalan</p>
    </div>
    <div id="alertMsg" class="alert alert-danger d-none" role="alert" style="border-radius: 10px;"></div>
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label text-secondary fw-semibold small">Username</label>
            <div class="input-group"><span class="input-group-text bg-white border-end-0 text-success"><i class="fas fa-user"></i></span><input type="text" id="username" class="form-control border-start-0 ps-0" required placeholder="Masukkan username"></div>
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary fw-semibold small">Password</label>
            <div class="input-group"><span class="input-group-text bg-white border-end-0 text-success"><i class="fas fa-lock"></i></span><input type="password" id="password" class="form-control border-start-0 ps-0" required placeholder="Masukkan password"></div>
        </div>
        <button type="submit" id="btnSubmit" class="btn btn-success btn-login w-100 text-white shadow-sm">MASUK SEKARANG <i class="fas fa-arrow-right ms-1"></i></button>
    </form>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz5TJaBRrrnS6-g8f81FAfKW_vgopn6Pd6sAq-I_okm1w4GodTPdTEtQHAbr4LmsHJU/exec'; 

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('btnSubmit');
        const alertMsg = document.getElementById('alertMsg');

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Memeriksa...'; btn.disabled = true; alertMsg.classList.add('d-none');

        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }) })
        .then(response => response.json()).then(result => {
            if (result.status === 'success') {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('role', result.role);
                sessionStorage.setItem('nama', result.nama_lengkap);
                
                // PERBAIKAN RUTE: Otomatis deteksi huruf besar/kecil
                if (String(result.role).toLowerCase() === 'admin') { window.location.href = 'index.html'; } 
                else { window.location.href = 'penyimak.html'; }
            } else {
                alertMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + result.message; alertMsg.classList.remove('d-none');
                btn.innerHTML = 'MASUK SEKARANG <i class="fas fa-arrow-right ms-1"></i>'; btn.disabled = false;
            }
        }).catch(error => {
            alertMsg.innerHTML = '<i class="fas fa-wifi"></i> Gagal terhubung ke server.'; alertMsg.classList.remove('d-none');
            btn.innerHTML = 'MASUK SEKARANG <i class="fas fa-arrow-right ms-1"></i>'; btn.disabled = false;
        });
    });
</script>
</body>
</html>
